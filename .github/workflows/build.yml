name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build and Analyze
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

      # ── Node.js Setup ─────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ── Install Dependencies ──────────────────────────────
      - name: Install server dependencies
        run: npm ci
        working-directory: server

      - name: Install client dependencies
        run: npm ci
        working-directory: client

      # ── Lint ──────────────────────────────────────────────
      - name: Lint server
        run: npm run lint
        working-directory: server

      - name: Lint client
        run: npm run lint
        working-directory: client

      # ── Tests + Coverage ──────────────────────────────────
      - name: Run tests with coverage
        run: npm test -- --coverage --ci
        working-directory: server

      # ── SonarQube Analysis ────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install SonarScanner CLI
        run: |
          export SONAR_SCANNER_VERSION=6.2.1.4610
          curl -sSLo /tmp/sonar-scanner.zip "https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-${SONAR_SCANNER_VERSION}-linux-x64.zip"
          unzip -q /tmp/sonar-scanner.zip -d /opt/
          echo "/opt/sonar-scanner-${SONAR_SCANNER_VERSION}-linux-x64/bin" >> $GITHUB_PATH

      - name: SonarQube Analysis
        run: |
          sonar-scanner \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.projectBaseDir=. \
            -Dsonar.verbose=true \
            -X
        env:
          SONAR_SCANNER_OPTS: "-Xmx512m -Dhttps.protocols=TLSv1.2 -Dhttp.keepAlive=false"

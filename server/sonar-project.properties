# ============================================================
# SonarQube — UCT (https://sonarqube.inf.uct.cl)
# IMPORTANTE: No hardcodear credenciales.
# Usar variables de entorno: SONAR_TOKEN, SONAR_PROJECT_KEY
# ============================================================

# Clave del proyecto (definida como variable de entorno en CI/CD)
sonar.projectKey=${SONAR_PROJECT_KEY}
sonar.projectName=UCT Vínculo Mayor - Backend

# Fuentes y tests
sonar.sources=src
sonar.tests=tests
sonar.inclusions=src/**/*.js
sonar.test.inclusions=tests/**/*.test.js

# Cobertura: ruta al reporte lcov generado por Jest
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Encoding del código fuente
sonar.sourceEncoding=UTF-8

# Exclusiones (no analizar infra de DB ni node_modules)
sonar.exclusions=**/node_modules/**,**/prisma/**,src/infrastructure/swagger.js,src/server.js

# Quality Gate — asegurar ≥70% de cobertura
# (configurar en el panel de SonarQube institucional)

# ============================================================================
# SonarQube Configuration — UCT-Vínculo Mayor
# Instancia: sonarqube.inf.uct.cl
# ============================================================================

sonar.projectKey=Desarrollo-de-software-2
sonar.projectName=UCT-Vinculo-Mayor

# Código fuente a analizar
sonar.sources=server/src

# Exclusiones del análisis
sonar.exclusions=**/node_modules/**,**/coverage/**,**/dist/**,**/prisma/migrations/**,**/prisma/seed.js,**/*.test.js,**/*.spec.js,system/**

# Directorio de tests
sonar.tests=server/tests
sonar.test.inclusions=**/*.test.js,**/*.spec.js

# Reporte de cobertura generado por Jest
sonar.javascript.lcov.reportPaths=server/coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8
